name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.4.8 black==24.4.2
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      # Avoid downloading large weights in CI; tests use stubs.
      CDP_LOAD_MODELS: "0"
      CDP_TEST_MODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch==2.3.1 torchvision==0.18.1
          pip install -r requirements-dev.txt
      - name: Pytest
        run: pytest -q -m "not slow and not gpu and not integration"
