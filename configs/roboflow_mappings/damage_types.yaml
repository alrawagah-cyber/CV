# ---------------------------------------------------------------------
# Map Roboflow damage-detection class names to our Layer-2 vocabulary.
# Normalization (applied before lookup): lowercased, non-alphanumerics
# collapsed to underscores. "Glass Shatter" -> "glass_shatter".
# ---------------------------------------------------------------------

target_classes:
  - dent
  - scratch
  - crack
  - shatter
  - tear
  - deformation
  - paint_loss
  - puncture
  - misalignment

mapping:
  # ---------- dent ----------
  dent: dent
  dents: dent
  dented: dent
  body_dent: dent
  door_dent: dent
  hood_dent: dent
  fender_dent: dent
  minor_dent: dent
  small_dent: dent
  large_dent: dent
  severe_dent: dent
  medium_dent: dent
  dent_minor: dent
  dent_moderate: dent
  dent_severe: dent
  mop_lom: dent                  # VehiDE — "móp lõm" (dent)
  # Roboflow compound <part>-dent labels
  bonnet_dent: dent
  boot_dent: dent
  doorouter_dent: dent
  front_bumper_dent: dent
  rear_bumper_dent: dent
  quaterpanel_dent: dent
  roof_dent: dent
  pillar_dent: dent
  major_rear_bumper_dent: dent
  medium_bodypanel_dent: dent
  runningboard_dent: dent
  # Roboflow "damaged <part>" labels (generic damage → dent as fallback)
  damaged_bumper: dent
  damaged_door: dent
  damaged_hood: dent
  damaged_mirror: dent
  sidemirror_damage: dent        # generic mirror damage → dent fallback
  runningboard_damage: deformation

  # ---------- scratch ----------
  scratch: scratch
  scratches: scratch
  scratched: scratch
  body_scratch: scratch
  paint_scratch: scratch
  minor_scratch: scratch
  deep_scratch: scratch
  scuff: scratch
  scuffed: scratch
  tray_son: scratch              # VehiDE — "trầy sơn" (paint scratch)
  # Roboflow compound <part>-scratch and severity-scratch
  doorouter_scratch: scratch
  front_bumper_scratch: scratch
  rear_bumper_scratch: scratch
  slight_scratch: scratch
  severe_scratch: scratch

  # ---------- crack ----------
  crack: crack
  cracks: crack
  cracked: crack
  body_crack: crack
  windshield_crack: crack
  bumper_crack: crack
  headlight_crack: crack
  taillight_crack: crack
  panel_crack: crack
  lamp_crack: crack
  crack_and_hole: crack          # Roboflow compound

  # ---------- shatter (glass) ----------
  shatter: shatter
  shattered: shatter
  shattered_glass: shatter
  glass_shatter: shatter
  glass_shattered: shatter
  glass_broken: shatter
  broken_glass: shatter
  smashed_glass: shatter
  broken_window: shatter
  cracked_glass: shatter       # glass cracks nearly always need replacement
  broken_windshield: shatter
  broken_headlight: shatter
  broken_taillight: shatter
  broken_light: shatter
  broken_lamp: shatter
  lamp_broken: shatter           # CarDD word order
  light_broken: shatter
  headlamp_broken: shatter
  taillamp_broken: shatter
  be_den: shatter                # VehiDE — "bể đèn" (broken lamp)
  vo_kinh: shatter               # VehiDE — "vỡ kính" (broken glass)
  # Roboflow "<part>-damage" labels where damage = breakage/glass
  front_windscreen_damage: shatter
  rear_windscreen_damage: shatter
  headlight_damage: shatter
  taillight_damage: shatter
  signlight_damage: shatter
  windshield_damage: shatter
  damaged_headlight: shatter
  damaged_wind_shield: shatter
  damaged_window: shatter

  # ---------- tear ----------
  tear: tear
  torn: tear
  rip: tear
  ripped: tear
  split: tear
  rach: tear                     # VehiDE — "rách" (torn)

  # ---------- deformation ----------
  deformation: deformation
  deformed: deformation
  bent: deformation
  bend: deformation
  warped: deformation
  crumpled: deformation
  crushed: deformation
  smash: deformation
  smashed: deformation
  crash: deformation
  major_crash: deformation
  major_damage: deformation
  structural_damage: deformation
  collision_damage: deformation
  tire_flat: deformation         # CarDD — flat tire is structural deformation
  flat_tire: deformation
  flat: deformation
  mat_bo_phan: deformation       # VehiDE — "mất bộ phận" (missing part / lost component)
  missing_part: deformation
  lost_part: deformation
  missing_component: deformation
  # Roboflow severity-prefixed deformation
  slight_deformation: deformation
  medium_deformation: deformation
  severe_deformation: deformation

  # ---------- paint loss ----------
  paint_loss: paint_loss
  paint_damage: paint_loss
  paint_chip: paint_loss
  chipped_paint: paint_loss
  faded_paint: paint_loss
  peeling_paint: paint_loss
  paint_peeling: paint_loss
  paint_fade: paint_loss
  paint_trace: paint_loss        # Roboflow — paint transfer marks

  # ---------- puncture ----------
  puncture: puncture
  hole: puncture
  pierced: puncture
  perforation: puncture
  thung: puncture                # VehiDE — "thủng" (punctured)

  # ---------- misalignment ----------
  misalignment: misalignment
  misaligned: misalignment
  gap: misalignment
  displacement: misalignment
  dislocation: misalignment
  dislocated: misalignment

  # ---------- Fallback for overly generic classes ----------
  # Several Roboflow datasets just label everything 'damage' with no finer
  # type. We map those to 'dent' as a coarse placeholder so training still
  # runs; consider removing or re-annotating for higher-quality L2 data.
  damage: dent
  damaged: dent
  defect: dent
  broken: shatter              # common but ambiguous — usually glass

skip:
  - no_damage
  - nodamage
  - clean
  - undamaged
  - intact
  - background
  - plate
  - license_plate
  - number_plate
  - car
  - vehicle
  - body
  - rust                       # not in our 9-class vocabulary
  - rusted
  - corrosion
  - dirty
  - mud
  # Roboflow junk / non-damage labels
  - car_damage_detection_v1_2023_04_04_2_25pm   # dataset name leaked as a class
