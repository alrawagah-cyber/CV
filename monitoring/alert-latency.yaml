# Cloud Monitoring alert: fires when p95 request latency > 60s
# over a 5-minute window.
#
# Apply:
#   gcloud monitoring policies create --from-file=monitoring/alert-latency.yaml

displayName: "Car Damage API — P95 Latency > 60s"
documentation:
  content: |
    The car-damage-api Cloud Run service p95 latency exceeded 60 seconds.
    This usually indicates a cold start storm or a model-loading failure.

    - Check if min-instances dropped to 0 and many requests arrived simultaneously.
    - Check Cloud Logging for weight-fetch or model-load errors.

    Dashboard: https://console.cloud.google.com/run/detail/me-central2/car-damage-api/metrics
  mimeType: text/markdown

combiner: OR
enabled: true

conditions:
  - displayName: "p95 latency on car-damage-api"
    conditionThreshold:
      filter: >-
        resource.type = "cloud_run_revision"
        AND resource.labels.service_name = "car-damage-api"
        AND metric.type = "run.googleapis.com/request_latencies"
      aggregations:
        - alignmentPeriod: 300s
          perSeriesAligner: ALIGN_PERCENTILE_95
          crossSeriesReducer: REDUCE_MAX
      comparison: COMPARISON_GT
      thresholdValue: 60000
      duration: 0s
      trigger:
        count: 1

notificationChannels: []
